{# templates/_kde_colors.ini — shared [Colors:*] block for KDE/KColorScheme,
   included by both kdeglobals.j2 and color-schemes/HWE.colors.j2 so the palette
   mapping lives in ONE place. NOT a *.j2 file, so the renderer never emits it
   on its own. Colours are KDE r,g,b decimal (kcol filter). Every KColorScheme
   key is filled so no group falls back to a light Breeze default. #}
{% macro cgroup(bg, bgalt, fg, finactive) -%}
BackgroundNormal={{ bg|kcol }}
BackgroundAlternate={{ bgalt|kcol }}
ForegroundNormal={{ fg|kcol }}
ForegroundInactive={{ finactive|kcol }}
ForegroundActive={{ sem.accent|kcol }}
ForegroundLink={{ sem.blue|kcol }}
ForegroundVisited={{ sem.magenta|kcol }}
ForegroundNegative={{ sem.red|kcol }}
ForegroundNeutral={{ sem.yellow|kcol }}
ForegroundPositive={{ sem.green|kcol }}
DecorationFocus={{ sem.accent|kcol }}
DecorationHover={{ sem.accent_soft|kcol }}
{%- endmacro -%}
[Colors:Window]
{{ cgroup(sem.bg_normal, sem.bg_light, sem.fg_white, sem.fg_normal) }}

[Colors:View]
{{ cgroup(sem.bg_dark, sem.bg_normal, sem.fg_white, sem.fg_normal) }}

[Colors:Button]
{{ cgroup(sem.bg_light, sem.bg_lighter, sem.fg_white, sem.fg_normal) }}

[Colors:Selection]
{{ cgroup(sem.accent, sem.accent_soft, sem.bg_dark, sem.bg_normal) }}

[Colors:Tooltip]
{{ cgroup(sem.bg_light, sem.bg_lighter, sem.fg_white, sem.fg_normal) }}

[Colors:Complementary]
{{ cgroup(sem.bg_dark, sem.bg_normal, sem.fg_white, sem.fg_normal) }}

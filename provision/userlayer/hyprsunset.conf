# ~/.config/hwe/hyprsunset.conf — your night-light schedule (hyprsunset).
#
# This file is yours: edit it and HWE will never touch it again. Until you do,
# `hwe update` keeps these defaults current; `hwe update --reset-defaults`
# brings them back at any time (your version is kept as a .hwe-bak backup).
#
# hyprsunset reads ~/.config/hypr/hyprsunset.conf, which HWE bridges to this
# file — edit HERE, apply with `hwe sunset off && hwe sunset on` (or a click
# on the bar's moon). Reference: https://wiki.hypr.land/Hypr-Ecosystem/hyprsunset/

# Warm evenings: 4000 K from 21:00, back to normal at 07:00. Every profile
# needs a time; between two times the LAST one wins.
profile {
    time = 21:00
    temperature = 4000
}

profile {
    time = 07:00
    identity = true
}

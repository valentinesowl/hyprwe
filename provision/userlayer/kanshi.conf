# ~/.config/hwe/kanshi.conf — your monitor profiles (kanshi).
#
# This file is yours: edit it and HWE will never touch it again. Until you do,
# `hwe update` keeps these defaults current; `hwe update --reset-defaults`
# brings them back at any time (your version is kept as a .hwe-bak backup).
#
# kanshi watches what is plugged in: when every output a profile names is
# connected, that profile is applied — dock and the layout follows, undock and
# it snaps back. Empty file = kanshi idles, changing nothing.
#
# One owner per output: if a profile manages an output, remove its `monitor =`
# line from ~/.config/hwe/hypr.conf — otherwise every `hyprctl reload` re-applies
# the Hyprland line and the two fight until the next hotplug event.
#
# Apply edits with `kanshictl reload`. Output names: `hyprctl monitors`.
# Reference: man 5 kanshi

# profile undocked {
#     output eDP-1 enable mode 2560x1600@165Hz scale 1.6
# }
#
# profile docked {
#     output eDP-1 disable
#     output "Dell Inc. U2723QE ABCD123" enable mode 3840x2160@60Hz position 0,0 scale 1.5
# }

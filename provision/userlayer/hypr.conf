# ~/.config/hwe/hypr.conf — your Hyprland settings.
#
# This file is yours. HWE created it once and will never rewrite it: it lives
# outside the repository, so `hwe update` can pull without ever colliding with
# your tweaks, and replacing the checkout does not take your setup with it.
#
# hyprland.conf sources this LAST, so anything here overrides what HWE ships.
# Apply changes with `hyprctl reload` (SUPER+SHIFT+R); `hwe doctor` will report
# a syntax error here the same as anywhere else.

# --- Displays -------------------------------------------------------------
# The one thing every machine gets differently. List your outputs with
# `hyprctl monitors`, then:  monitor = NAME, RESOLUTION, POSITION, SCALE
#
# monitor = eDP-1,    2560x1600@165, 0x0,        1.6
# monitor = DP-1,     3840x2160@60,  auto-right, 1.5
# monitor = HDMI-A-1, preferred,     auto,       1

# --- Input ----------------------------------------------------------------
# Only the keys you name are changed; the rest of HWE's input.conf still applies.
#
# input {
#     kb_layout = us,de
#     repeat_rate = 40
#     touchpad {
#         natural_scroll = true
#     }
# }

# --- Keybindings ----------------------------------------------------------
# Binding a combination HWE already uses replaces it. To drop one entirely,
# unbind it — see `hwe keys` (SUPER+/) for what is currently bound.
#
# unbind = SUPER, T
# bind = SUPER, RETURN, exec, kitty

# --- Autostart ------------------------------------------------------------
#
# exec-once = nm-applet --indicator

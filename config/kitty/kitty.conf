# kitty.conf — HWE terminal (Catppuccin Mocha).

# --- Font -----------------------------------------------------------------
# family + size are GENERATED from the theme's [font] contract (hwe theme apply)
include font.conf
adjust_line_height 108%

# --- Window ---------------------------------------------------------------
window_padding_width 10
# background_opacity is set by the GENERATED colors.conf (included below) so the
# terminal's translucency tracks the theme's `opacity` param — don't set it here.
confirm_os_window_close 0
hide_window_decorations yes
enable_audio_bell no

# --- Cursor & scrollback --------------------------------------------------
cursor_shape beam
cursor_blink_interval 0.5
scrollback_lines 10000

# --- Tabs -----------------------------------------------------------------
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# --- Colours ---------------------------------------------------------------
# Generated by `hwe theme` — regenerate with: hwe theme apply <name>
include colors.conf

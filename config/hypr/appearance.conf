# appearance.conf — the look & feel: layout, gaps, borders, blur, animations.

# gaps/border_size below are the pre-theme baseline; the generated theme.conf
# (sourced next) overrides them per-theme. Border colours live ONLY there.
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    # rounding is the pre-theme baseline; theme.conf overrides it per-theme.
    # Window opacity lives entirely in theme.conf (a global opacity windowrule).
    rounding = 10

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(11111baa)
    }

    blur {
        enabled = true
        # pre-theme baseline; theme.conf overrides size/passes per-theme.
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows,     1, 5, wind,      slide
    animation = windowsIn,   1, 5, overshot,  slide
    animation = windowsOut,  1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, wind,      slide
    animation = border,      1, 8, default
    animation = fade,        1, 6, smoothIn
    animation = workspaces,  1, 5, wind
}

# Layout tuning (pseudotiling is a dispatcher now — see SUPER+P in keybindings)
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    # Silence the "launched without start-hyprland" nag: under SDDM/uwsm the
    # crash-watchdog isn't the parent, so Hyprland warns every login. Optional.
    disable_watchdog_warning = true
}

# environment.conf — session-wide variables and theme tokens.

# --- Convenience variables (referenced across the config) -----------------
$mainMod   = SUPER
$terminal  = kitty
$launcher  = rofi -show drun
$fileMgr   = dolphin
$browser   = firefox            # set to your preferred browser

# Colour variables ($accent, $accent2, $inactive, …) come from the generated
# colors.conf, sourced before this file in hyprland.conf.

# --- Wayland / toolkit environment ----------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# Cursor size (keep in sync with your GTK/Qt theme).
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

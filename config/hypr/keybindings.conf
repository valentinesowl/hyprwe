# keybindings.conf — keyboard shortcuts. $mainMod is SUPER (see environment.conf).
# List active binds at runtime with:  hyprctl binds
# Design rule: arrow keys move focus/windows; no key is bound twice.

# --- Core apps & window actions -------------------------------------------
bind = $mainMod, T, exec, $terminal     # terminal (kitty)
bind = $mainMod, N, exec, $fileMgr      # file manager (dolphin)
bind = $mainMod, B, exec, $browser      # web browser
bind = $mainMod, R, exec, $launcher     # app launcher (rofi)
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, P, pseudo        # dwindle pseudotile (moved off Super+P)
bind = $mainMod, J, layoutmsg, togglesplit  # dwindle: flip tile split vertical<->horizontal
bind = $mainMod, L, exec, hyprlock      # lock the session
bind = $mainMod, Escape, exec, hyprlock # lock the session (secondary)
bind = $mainMod SHIFT, R, exec, hyprctl reload  # reload config in-session
bind = $mainMod SHIFT, T, exec, hwe theme pick  # rofi theme selector
bind = $mainMod SHIFT, W, exec, hwe wall pick   # rofi wallpaper picker
bind = $mainMod SHIFT, E, exec, hwe power       # rofi session menu (lock/logout/…)
bind = $mainMod, slash, exec, hwe keys          # keybind cheatsheet overlay
bind = $mainMod, C, exec, hwe clip              # clipboard history picker
bind = $mainMod SHIFT, C, exec, hyprpicker -a -f hex  # pick a screen colour -> clipboard
bind = $mainMod ALT, R, exec, hwe record        # record the whole screen
bind = $mainMod ALT, S, exec, hwe record region # record a selected region
bind = $mainMod SHIFT, Q, exit          # leave the Hyprland session
bindl = $mainMod, SPACE, exec, hyprctl switchxkblayout current next  # cycle kb layout (us <-> ru); `l` flag = also fires while hyprlock is active

# --- Screenshots (grim + slurp + satty) -----------------------------------
# Region shots guard on slurp: `g=$(slurp) &&` aborts cleanly when the
# selection is cancelled (Esc), and mkdir ensures ~/Pictures exists.
bind = , Print,             exec, grim - | wl-copy                  # whole screen -> clipboard
bind = SHIFT, Print,        exec, g=$(slurp) && grim -g "$g" - | wl-copy    # region -> clipboard
bind = $mainMod, Print,     exec, g=$(slurp) && mkdir -p ~/Pictures && grim -g "$g" ~/Pictures/$(date +%F_%H-%M-%S).png  # region -> file
bind = $mainMod SHIFT, Print, exec, g=$(slurp) && mkdir -p ~/Pictures && grim -g "$g" - | satty --filename - --copy-command wl-copy --output-filename ~/Pictures/$(date +%F_%H-%M-%S).png  # region -> annotate
bind = $mainMod, P,         exec, g=$(slurp) && mkdir -p ~/Pictures && grim -g "$g" - | satty --filename - --copy-command wl-copy --output-filename ~/Pictures/$(date +%F_%H-%M-%S).png  # same as Super+Shift+Print

# --- Volume & brightness (swayosd shows an on-screen indicator) ------------
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# --- Media playback (playerctl) -------------------------------------------
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# --- Focus movement (arrow keys) ------------------------------------------
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move windows (arrow keys) --------------------------------------------
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Workspaces 1..10 -----------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move active window to workspace 1..10 --------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Scroll through workspaces / special "scratchpad" ---------------------
bind = $mainMod, mouse_down, workspace, e+1     # next workspace
bind = $mainMod, mouse_up,   workspace, e-1     # previous workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic  # send window to scratchpad

# --- Mouse: move / resize floating windows --------------------------------
bindm = $mainMod, mouse:272, movewindow    # drag to move window
bindm = $mainMod, mouse:273, resizewindow  # drag to resize window

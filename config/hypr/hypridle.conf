# hypridle.conf — idle management: dim, lock, DPMS off, suspend.

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid stacking lockers
    before_sleep_cmd = loginctl lock-session     # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on   # wake displays on resume
}

# Lock the screen after 5 minutes.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn displays off after 6 minutes.
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}


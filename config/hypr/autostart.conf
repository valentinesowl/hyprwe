# autostart.conf — programs launched with the session.
# exec-once = runs on login only.  exec = runs on every config reload too.

# --- Core session services ------------------------------------------------
exec-once = systemctl --user import-environment PATH WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = hwe wall restore          # start hyprpaper + apply active wallpaper (via IPC)
exec-once = mako                      # notifications
exec-once = waybar                    # status bar
exec-once = hypridle                  # idle -> lock/dpms
exec-once = swayosd-server            # on-screen volume/brightness/caps OSD
exec-once = systemctl --user start hyprpolkitagent   # polkit auth prompts
exec-once = nm-applet --indicator     # network tray (VPN + full network GUI)
exec-once = blueman-applet            # bluetooth tray
exec-once = udiskie --tray            # automount removable media + tray

# --- Clipboard history (cliphist) — watch both text and images ------------
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- User directories (~/Pictures etc. for screenshots) -------------------
exec-once = xdg-user-dirs-update

# --- Health check ---------------------------------------------------------
# Surface any Hyprland config-syntax breakage on-screen at login (Hyprland's
# config grammar shifts across releases). No-op when the config is clean.
exec-once = hwe checkconfig --notify

# First-login greeting (points at the SUPER+/ cheatsheet); shows once, then
# drops a sentinel and stays quiet forever after.
exec-once = hwe welcome

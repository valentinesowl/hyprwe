# input.conf — keyboard, pointer, touchpad and gestures.

input {
    # us + ru; toggle with Super+Space (switchxkblayout bind in keybindings.conf).
    # Don't add `kb_options = grp:*_toggle` here — it would double-bind the key
    # against the Hyprland bind and cancel itself out.
    kb_layout = us,ru

    follow_mouse = 1
    sensitivity = 0            # -1.0 .. 1.0 (0 = flat / no accel change)

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        clickfinger_behavior = true
    }
}

# Touchpad workspace swipe (new unified `gesture` syntax:
#   gesture = <fingers>, <direction>, <action>).
gesture = 3, horizontal, workspace

# Per-device tweaks example (name from `hyprctl devices`):
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

# windowrules.conf — per-window behaviour.
# Hyprland v0.53+ syntax: `windowrule = <rule> <value>, match:<field> <regex>`.
# Inspect a window's class/title with:  hyprctl clients
# Docs: https://wiki.hypr.land/Configuring/Window-Rules/

# --- Float common transient dialogs ---------------------------------------
windowrule = float true, match:class ^(org.pulseaudio.pavucontrol|pavucontrol|nm-connection-editor|blueman-manager)$
windowrule = float true, match:title ^(Open File|Save File|Choose Files)$
windowrule = float true, match:class ^(xdg-desktop-portal-gtk)$

# --- Picture-in-Picture: floating, pinned, keep aspect --------------------
windowrule = float true,             match:title ^(Picture-in-Picture)$
windowrule = pin true,               match:title ^(Picture-in-Picture)$
windowrule = keep_aspect_ratio true, match:title ^(Picture-in-Picture)$

# --- Opacity ---------------------------------------------------------------
# The GLOBAL opacity rule (so blur shows through windows) lives in the generated
# theme.conf, tracking the theme's `opacity` param. To force an app opaque,
# override it here AFTER that rule loads, e.g.:
#   windowrule = opacity 1.0 override 1.0 override, match:class ^(some-app)$

# --- Fixes ----------------------------------------------------------------
# Some GTK portals flash focus on open.
windowrule = no_initial_focus true, match:class ^(xdg-desktop-portal-gtk)$
# Never idle-lock while a media app is fullscreen. Scoped to browsers/players ON
# PURPOSE: a blanket ^(.*)$ would let any fullscreen window (terminal, editor)
# suppress auto-lock and leave the machine unlocked. Add your player's class here.
windowrule = idle_inhibit fullscreen, match:class ^(firefox|librewolf|zen|chromium|google-chrome|brave-browser|vivaldi-stable|mpv|vlc|Celluloid|io.github.celluloid)$

# --- Layer rules (blur the launcher, notifications & bar) -----------------
layerrule = blur true,     match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur true,     match:namespace ^(mako|notifications)$
# Frosted-strip waybar: blur behind the bar's translucent backdrop. ignore_alpha
# skips the fully-transparent gaps so only the ~0.35 backdrop gets frosted.
layerrule = blur true,     match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

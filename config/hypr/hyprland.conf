# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Hyprland Workstation Environment (HWE)                                 ║
# ║  Main entry point — this file only wires modules together.             ║
# ║  Edit the sourced files below; keep this one as the table of contents. ║
# ╚══════════════════════════════════════════════════════════════════════╝

# --- Modules (order matters: colours/env first, rules/binds last) ---------
source = ~/.config/hypr/colors.conf        # GENERATED by `hwe theme` ($accent, …)
source = ~/.config/hypr/environment.conf   # session env vars
source = ~/.config/hypr/monitors.conf      # displays & scaling
source = ~/.config/hypr/appearance.conf    # look: general / decoration / animations
source = ~/.config/hypr/theme.conf         # GENERATED by `hwe theme` (animated border)
source = ~/.config/hypr/input.conf         # keyboard, mouse, touchpad, gestures
source = ~/.config/hypr/keybindings.conf   # keyboard shortcuts
source = ~/.config/hypr/windowrules.conf   # per-window rules
source = ~/.config/hypr/autostart.conf     # things to launch on login

# --- Yours (parsed last, so it wins) --------------------------------------
# Your own displays, input and keybinds live in ~/.config/hwe/hypr.conf, which
# is created for you on install and never rewritten. It sits outside the repo on
# purpose: everything above is a symlink into the checkout, so editing it in
# place would dirty the tree and block the fast-forward pull `hwe update` does.
source = ~/.config/hwe/hypr.conf

# monitors.conf — the default HWE ships: auto-detect every output at its
# preferred mode, which is the only sane guess for a machine we know nothing about.
#
# Your displays do NOT belong here. This file is a symlink into the repository,
# so a change to it dirties the checkout and blocks `hwe update`'s pull. Put your
# monitor lines in ~/.config/hwe/hypr.conf instead — it is parsed after this file
# and overrides it, and nothing in HWE ever rewrites it.

monitor = , preferred, auto, 1

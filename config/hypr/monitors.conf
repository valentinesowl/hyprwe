# monitors.conf — display configuration.
# Default: auto-detect every output at its preferred mode. Syntax:
#   monitor = NAME, RESOLUTION, POSITION, SCALE   (list outputs: hyprctl monitors)
#
# Examples:
#   monitor = eDP-1,  2560x1600@165, 0x0,    1.6
#   monitor = DP-1,   3840x2160@60,  auto,   1.5
#   monitor = HDMI-A-1, preferred,   auto-right, 1

monitor = , preferred, auto, 1

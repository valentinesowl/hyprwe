# hyprpaper.conf — wallpaper daemon config.
#
# NOTE: we do NOT set the wallpaper here. hyprpaper 0.8.4's config-file
# preload/wallpaper directives don't expand ~ or $HOME, so a path pointing at the
# assets/current.wall symlink silently loads nothing at boot (grey screen). The
# wallpaper is applied instead by `hwe wall restore` (autostart.conf) over IPC,
# using a resolved absolute path. Change it with:
#   hwe wall pick        # rofi picker (SUPER+SHIFT+W)
#   hwe wall set <path>

splash = false
ipc = on

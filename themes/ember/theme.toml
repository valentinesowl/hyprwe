# themes/ember/theme.toml — sunset aurora.
# Cold deep-blue night surfaces, warm-neutral cream text, one coral accent.
# Warm foreground over cool background = the ember signature; the coral is the
# single warm pop (accent + border), not a colour spread across the text too.

name = "Ember"

[palette]
coral = "#e97e70"
rose  = "#d28285"
amber = "#d09868"

[sem]
# surfaces (dark -> light): cold deep-blue night
bg_dark    = "#0e1219"
bg_normal  = "#121823"
bg_light   = "#1c2333"
bg_lighter = "#283040"
# text (dim -> max contrast): warm NEUTRAL cream/sand — not rose. The old ramp
# was dusty-rose (#d28285 &co), so the reddish text plus the coral accent border
# blurred the whole desktop into one red smear. Pulling the text to warm-neutral
# leaves the coral accent as the ONLY red — a focal pop, not a field. Still warm
# (R>G>B), still the ember signature, just legible. All rows clear the WCAG floor.
fg_dim     = "#7a7168"
fg_normal  = "#a89c8c"
fg_bright  = "#ddd2c4"
fg_white   = "#efe6da"
# accent — warm coral
accent      = "#e97e70"
accent_soft = "#c85a4a"
# raw colours — sunset aurora
red     = "#c13d2e"
green   = "#7a9a6a"
yellow  = "#d09868"
orange  = "#e97e70"
blue    = "#6a7a9a"
magenta = "#9a6a8a"
cyan    = "#6a9a8a"
# service
border = "#1e2636"
urgent = "#c13d2e"

[params]
font          = "JetBrainsMono Nerd Font"
rounding      = 10
gaps_in       = 5
gaps_out      = 12
border_size   = 1
opacity       = 0.94
blur_passes   = 3
blur_size     = 6
# ── Waybar geometry (glued & flat by default; set bar_float = true to float) ──
bar_height  = 26
bar_float   = false
bar_gap     = 6      # top gap when floating
bar_gap_x   = 8      # side gap when floating
bar_radius  = 14     # corner radius when floating
# ── Waybar workspace focus: how the ACTIVE tag is marked ──────────────────
# glow: accent halo on the number | underline: rule growing from the centre
# pill: the tag widens into a chip | dot: a mark rising from below.
# (No style slides between tags — GTK3 CSS has no transform; see theme.css.j2.)
bar_ws_indicator = "glow"
bar_ws_speed     = 220   # ms for the indicator to settle


# ── Typography (contract): font family + per-surface sizes ────────────────
# Templates read these ONLY (never hardcode a font); omit any line to inherit
# the renderer default. Sizes are pt (px for the bar); terminal accepts decimals.
[font]
family    = "IntoneMono Nerd Font"
icon_family     = "Symbols Nerd Font Mono"   # the bar/launcher glyphs
fallback_family = "JetBrains Mono"           # used where `family` is not installed
ui_family = "Sans"   # GTK/UI apps (size from `gtk`)
terminal = 9.5    # kitty
bar      = 12     # waybar
launcher = 11     # rofi menus (base; pickers scale ± from this)
notify   = 11     # mako
gtk      = 11     # GTK apps (family stays Sans)

# ── Wallpaper (scripts/genwall.py) ───────────────────────────────────────
# style: mesh | aurora | voronoi | grid | signal. seed rerolls the composition.
[wallpaper]
style = "aurora"

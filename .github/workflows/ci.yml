# CI — every gate `just check` runs locally, run again on PRs and on main.
#
# Runs on Arch via the official container image, plus one job on Ubuntu — HWE
# installs on both, and the Arch jobs cannot see a path that only exists on the
# other. Each job installs just the tools its gate needs inline — the same tools a
# contributor gets from `hwe install` (pkg/dev.lst), but as a per-job subset. Keep
# the two in sync when adding a gate.
#
# Whether pkg/map/apt.map still matches Ubuntu's archive is a question about
# someone else's servers, not about a commit, so it lives in its own scheduled
# workflow (aptmapwatch.yml) rather than gating every PR.
#
# The jobs are split by tool rather than lumped into one `just check` so a red
# tick names the thing that broke without anyone opening the log.
---
name: CI

"on":
  pull_request:
  push:
    branches: [main]
  # Lets a maintainer re-run the suite from the Actions tab without an empty commit.
  workflow_dispatch:

# A new push to a PR makes the previous run's answer worthless — drop it rather
# than pay for it. `github.ref` keeps main's runs from cancelling each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install tools
        run: pacman -Syu --noconfirm --needed git just shellcheck
      - uses: actions/checkout@v5
      - run: just lint

  python:
    name: ruff + pytest
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      # python-jinja and python-numpy are what the theme renderer and the
      # wallpaper generator actually import; imagemagick backs the preview cards.
      # fontconfig + ttf-dejavu: genpreview resolves a font via fc-match and falls
      # back to DejaVu-Sans-Bold — magick needs both installed or the card render
      # (test_every_shipped_theme_renders_a_card) exits non-zero.
      - name: Install tools
        run: >
          pacman -Syu --noconfirm --needed
          git just ruff python python-pytest python-jinja python-numpy imagemagick
          fontconfig ttf-dejavu
      - uses: actions/checkout@v5
      # actions/checkout in a container leaves the tree owned by a uid the (root)
      # job isn't — git then refuses with "dubious ownership" and `git ls-files`
      # exits 128, erroring the repo-hygiene tests. Trust the ephemeral checkout.
      - run: git config --global --add safe.directory '*'
      - run: just lint-py
      - run: just test-py

  shell-tests:
    name: bats
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install tools
        run: >
          pacman -Syu --noconfirm --needed
          git just bats bats-assert bats-support python python-jinja
      - uses: actions/checkout@v5
      # The suite runs `hwe theme validate` against every shipped theme, which
      # shells out to the Python renderer — hence python-jinja above.
      - run: just test-sh

  shell-tests-ubuntu:
    name: bats (Ubuntu)
    runs-on: ubuntu-latest
    # HWE claims to install on Ubuntu, so the gates have to pass there too — and
    # this is the only job that exercises the non-Arch paths at all: helper.bash
    # probing for bats-assert outside /usr/lib/bats, and every tool our own code
    # shells out to being present under its Debian name rather than Arch's.
    #
    # It has already earned its place: adding it surfaced that curl, gnupg, tar
    # and xz were called by HWE and declared nowhere, invisible on Arch because
    # `base` supplies them.
    container: ubuntu:26.04
    steps:
      # ca-certificates is not decoration: --no-install-recommends drops it, and
      # without it actions/checkout cannot clone over https at all ("Problem with
      # the SSL CA cert"). The Arch image ships them, so only this job needs to
      # say so — and only on a real runner, since a local container run mounts the
      # tree instead of cloning it and never reaches the step that fails.
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -q --no-install-recommends \
            ca-certificates git just bats bats-assert bats-support \
            python3 python3-jinja2 gnupg curl xz-utils
      - uses: actions/checkout@v5
      - run: git config --global --add safe.directory '*'
      - run: just test-sh

  python-ubuntu:
    name: pytest (Ubuntu)
    runs-on: ubuntu-latest
    # Same reasoning as bats (Ubuntu): the Python tools run on both distros, so
    # their suite has to pass against Ubuntu's python3/numpy/ImageMagick, not
    # only Arch's. Measured before adding: 26.04 ships ImageMagick 7 with the
    # `magick` binary, so even the end-to-end card render runs — 461 tests, no
    # skips. Linting is not repeated here: the Arch job's ruff is the gate, and
    # uvx resolves the identical version anyway.
    container: ubuntu:26.04
    steps:
      # ca-certificates: same story as in bats (Ubuntu) above.
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -q --no-install-recommends \
            ca-certificates git just python3 python3-pytest python3-jinja2 \
            python3-numpy imagemagick fontconfig fonts-dejavu-core
      - uses: actions/checkout@v5
      - run: git config --global --add safe.directory '*'
      - run: just test-py

  workflows:
    name: actionlint + yamllint
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install tools
        run: pacman -Syu --noconfirm --needed git just actionlint yamllint
      - uses: actions/checkout@v5
      - run: just lint-ci
